name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
      - name: Build executable
        run: pyinstaller --noconfirm --clean --onefile --name github-pr-monitor src/main.py
      - name: Package release artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          PKG_NAME="github-pr-monitor-${RUNNER_OS}-${VERSION}.tar.gz"
          tar -czf "dist/${PKG_NAME}" -C dist github-pr-monitor
          shasum -a 256 "dist/${PKG_NAME}" > "dist/SHA256SUMS-${RUNNER_OS}.txt"
      - name: Package release artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { 'manual' }
          $pkgName = "github-pr-monitor-$env:RUNNER_OS-$version.zip"
          Compress-Archive -Path dist/github-pr-monitor.exe -DestinationPath "dist/$pkgName" -Force
          (Get-FileHash "dist/$pkgName" -Algorithm SHA256).Hash + "  $pkgName" | Out-File -FilePath "dist/SHA256SUMS-$env:RUNNER_OS.txt" -Encoding ascii
      - name: Publish release assets
        uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS-*.txt
